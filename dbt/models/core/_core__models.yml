version: 2

models:
  - name: dim_advisor
    description: >
      Conformed advisor dimension. One row per (company, advisor_identifier).
      advisor_sk is a hash of (company, advisor_identifier); advisor IDs are
      not globally unique across companies, so same ID in different companies
      is modelled as separate advisors.
    columns:
      - name: advisor_sk
        description: Surrogate key. Hash of (company, advisor_identifier).
        data_tests:
          - not_null
          - unique
      - name: advisor_identifier
        description: Source advisor ID (e.g. ADV0180, MBK0397).
        data_tests:
          - not_null
      - name: company
        description: Source tenant.
        data_tests:
          - not_null
          - accepted_values:
              values: ['MAIN_BOOK', 'INDIGO_INSURANCE', 'HORIZON_ASSURANCE']

  - name: fct_commissions
    description: >
      Conformed commissions fact. Grain = one row per commission payout.
      Union of ins_commissions and inv_commissions from all three tenants.
      commission_category distinguishes INSURANCE vs INVESTMENT source.
    columns:
      - name: commission_sk
        description: Surrogate key. Hash of (company, commission_id).
        data_tests:
          - not_null
          - unique
      - name: advisor_sk
        description: FK to dim_advisor.
        data_tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              to: ref('dim_advisor')
              field: advisor_sk
              config:
                severity: warn
      - name: policy_sk
        data_tests:
          - relationships:
              to: ref('dim_policy')
              field: policy_sk
              config:
                severity: warn
                where: "policy_sk is not null"
      - name: date_sk
        data_tests:
          - relationships:
              to: ref('dim_date')
              field: date_sk
              config:
                severity: warn
                where: "date_sk is not null"
      - name: commission_id
        data_tests:
          - not_null
      - name: company
        data_tests:
          - not_null
          - accepted_values:
              values: ['MAIN_BOOK', 'INDIGO_INSURANCE', 'HORIZON_ASSURANCE']
      - name: commission_category
        data_tests:
          - not_null
          - accepted_values:
              values: ['INSURANCE', 'INVESTMENT']
      - name: transaction_date
        data_tests:
          - not_null
      - name: gross_amount
        data_tests:
          - not_null

  - name: dim_product
    description: >
      Conformed product dimension. Products span two universes:
      investment (has product_code, e.g. LA/RA/UT) and insurance
      (name-only, e.g. Indigo Premier). Natural key per tenant is
      coalesce(product_code, product_name).
    columns:
      - name: product_sk
        description: Surrogate key. Hash of (company, product_category, natural_key).
        data_tests:
          - not_null
          - unique
      - name: company
        data_tests:
          - not_null
          - accepted_values:
              values: ['MAIN_BOOK', 'INDIGO_INSURANCE', 'HORIZON_ASSURANCE']
      - name: product_category
        data_tests:
          - not_null
          - accepted_values:
              values: ['INVESTMENT', 'INSURANCE']

  - name: dim_fund
    description: >
      Conformed fund dimension. Sourced from valuations only. fund_name is
      the primary natural key per tenant. fund_code and jse_code are
      attributes (nullable). fund_type derived: ETF if jse_code present,
      else UNIT_TRUST.
    columns:
      - name: fund_sk
        description: Surrogate key. Hash of (company, fund_name).
        data_tests:
          - not_null
          - unique
      - name: fund_name
        data_tests:
          - not_null
      - name: company
        data_tests:
          - not_null
          - accepted_values:
              values: ['MAIN_BOOK', 'INDIGO_INSURANCE', 'HORIZON_ASSURANCE']
      - name: fund_type
        data_tests:
          - not_null
          - accepted_values:
              values: ['ETF', 'UNIT_TRUST']

  - name: dim_date
    description: >
      Conformed date dimension. Range 2015-01-01 to 2030-12-31.
      date_sk is YYYYMMDD integer. Fiscal year per South African tax year
      (starts 1 March).
    columns:
      - name: date_day
        description: Calendar date. Primary natural key.
        data_tests:
          - not_null
          - unique
      - name: date_sk
        description: YYYYMMDD integer surrogate key.
        data_tests:
          - not_null
          - unique
      - name: year
        data_tests:
          - not_null
      - name: fiscal_year
        data_tests:
          - not_null

  - name: fct_valuations
    description: >
      Investment portfolio valuations fact. Grain = one row per
      (company, policy_number, fund_name, valuation_date).
      FKs: advisor, product (INVESTMENT only), fund, date.
      Nullable FKs use warn-severity relationship tests since source data
      has ~15% nulls in advisor_identifier, product, and fund columns.
    columns:
      - name: valuation_sk
        description: Surrogate key. Hash of (company, policy_number, fund_name, valuation_date).
        data_tests:
          - not_null
          - unique
      - name: advisor_sk
        data_tests:
          - relationships:
              to: ref('dim_advisor')
              field: advisor_sk
              config:
                severity: warn
                where: "advisor_sk is not null"
      - name: product_sk
        data_tests:
          - relationships:
              to: ref('dim_product')
              field: product_sk
              config:
                severity: warn
                where: "product_sk is not null"
      - name: fund_sk
        data_tests:
          - relationships:
              to: ref('dim_fund')
              field: fund_sk
              config:
                severity: warn
                where: "fund_sk is not null"
      - name: date_sk
        data_tests:
          - relationships:
              to: ref('dim_date')
              field: date_sk
              config:
                severity: warn
                where: "date_sk is not null"
      - name: policy_sk
        data_tests:
          - relationships:
              to: ref('dim_policy')
              field: policy_sk
              config:
                severity: warn
                where: "policy_sk is not null"
      - name: client_sk
        data_tests:
          - relationships:
              to: ref('dim_client')
              field: client_sk
              config:
                severity: warn
                where: "client_sk is not null"
      - name: company
        data_tests:
          - not_null
          - accepted_values:
              values: ['MAIN_BOOK', 'INDIGO_INSURANCE', 'HORIZON_ASSURANCE']
      - name: policy_number
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: valuation_date
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: market_value_amount
        data_tests:
          - not_null:
              config:
                severity: warn

  - name: dim_policy
    description: >
      Conformed policy dimension covering two policy universes:
      RISK (full master data from risk_benefits/insurance/assurance
      tables, prefix RB*/IND*/HZR*) and INVESTMENT (minimal attributes,
      policy_number only, referenced in valuations and transactions,
      prefix POL*/INV*/HZV*).

      Materialized Type 1. Type 2-ready columns (is_current, valid_from,
      valid_to) included with defaults so we can transition to dbt
      snapshots later without restructuring facts.
    columns:
      - name: policy_sk
        description: Surrogate key. Hash of (company, policy_number).
        data_tests:
          - not_null
          - unique
      - name: policy_number
        data_tests:
          - not_null
      - name: company
        data_tests:
          - not_null
          - accepted_values:
              values: ['MAIN_BOOK', 'INDIGO_INSURANCE', 'HORIZON_ASSURANCE']
      - name: policy_universe
        data_tests:
          - not_null
          - accepted_values:
              values: ['RISK', 'INVESTMENT']
      - name: is_current
        data_tests:
          - not_null

  - name: fct_transactions
    description: >
      Conformed transactions fact. Two universes: RISK (risk_benefits/
      insurance transactions) and INVESTMENT (valuation transactions).
      Union into a single fact with `transaction_category`.
      Universe-specific columns (member_id, claim_*, benefit_affected for
      RISK; fund_code, units, price_per_unit, source_fund for INVESTMENT)
      are null for the other universe.
    columns:
      - name: transaction_sk
        description: Surrogate key. Hash of (company, transaction_id).
        data_tests:
          - not_null
          - unique
      - name: policy_sk
        data_tests:
          - relationships:
              to: ref('dim_policy')
              field: policy_sk
              config:
                severity: warn
                where: "policy_sk is not null"
      - name: client_sk
        data_tests:
          - relationships:
              to: ref('dim_client')
              field: client_sk
              config:
                severity: warn
                where: "client_sk is not null"
      - name: fund_sk
        data_tests:
          - relationships:
              to: ref('dim_fund')
              field: fund_sk
              config:
                severity: warn
                where: "fund_sk is not null"
      - name: date_sk
        data_tests:
          - relationships:
              to: ref('dim_date')
              field: date_sk
              config:
                severity: warn
                where: "date_sk is not null"
      - name: company
        data_tests:
          - not_null
          - accepted_values:
              values: ['MAIN_BOOK', 'INDIGO_INSURANCE', 'HORIZON_ASSURANCE']
      - name: transaction_category
        data_tests:
          - not_null
          - accepted_values:
              values: ['RISK', 'INVESTMENT']
      - name: transaction_id
        data_tests:
          - not_null:
              config:
                severity: warn

  - name: fct_policies
    description: >
      Accumulating snapshot fact at policy grain. One row per policy, with
      dim_policy attributes plus lifetime roll-ups from fct_commissions,
      fct_valuations (including latest market value), and fct_transactions.
      snapshot_date = dbt run date; every row is a "today" snapshot.
      When true periodic history is needed, write to fct_policy_snapshots
      with snapshot_date as part of grain.
    columns:
      - name: policy_sk
        description: PK. 1:1 with dim_policy.
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('dim_policy')
              field: policy_sk
      - name: date_sk
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_sk
      - name: company
        data_tests:
          - not_null
          - accepted_values:
              values: ['MAIN_BOOK', 'INDIGO_INSURANCE', 'HORIZON_ASSURANCE']
      - name: policy_universe
        data_tests:
          - not_null
          - accepted_values:
              values: ['RISK', 'INVESTMENT']

  - name: dim_client
    description: >
      Conformed client dimension. Sourced from valuations and transactions
      tables (only sources with client_id_number). Covers ~15K unique
      clients across 3 tenants. PII columns: client_first_name,
      client_surname, client_initials, client_id_number, birth_date —
      to be protected with Snowflake dynamic masking policies.
      birth_date and age_years derived from client_id_number (SA ID
      format: YYMMDDxxxxxx, century rule 00-29 → 2000s else 1900s).
    columns:
      - name: client_sk
        description: Surrogate key. Hash of (company, client_id_number).
        data_tests:
          - not_null
          - unique
      - name: client_id_number
        description: Natural identifier (PII — to be masked).
        data_tests:
          - not_null
      - name: company
        data_tests:
          - not_null
          - accepted_values:
              values: ['MAIN_BOOK', 'INDIGO_INSURANCE', 'HORIZON_ASSURANCE']
