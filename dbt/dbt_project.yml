name: 'snowflake_migration'
version: '1.0.0'
config-version: 2

profile: 'snowflake_migration'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  snowflake_migration:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    core:
      +materialized: table
      +schema: core
      vault:
        # Insert-only Vault discipline. unique_key per model.
        +materialized: incremental
        +schema: core
    marts:
      +materialized: table
      +schema: marts

snapshots:
  snowflake_migration:
    +target_schema: "{{ (env_var('DBT_SCHEMA_PREFIX', '') ~ 'CORE') | upper }}"
    +target_database: "{{ target.database }}"
